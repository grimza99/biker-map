name: Dev PR Tests

on:
  pull_request:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: dev-pr-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

  web-auth-e2e:
    name: Web Auth E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Typecheck web
        run: npm exec tsc -- --noEmit --pretty false
        working-directory: web

      - name: Reset local Supabase
        run: npm run supabase:reset

      - name: Run local Supabase E2E
        run: npm run test:e2e:local-supabase

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop local Supabase
        if: always()
        run: npm run supabase:stop
