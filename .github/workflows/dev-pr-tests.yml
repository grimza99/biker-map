name: Dev PR Tests

on:
  pull_request:
    branches:
      - dev

concurrency:
  group: dev-pr-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-auth-e2e:
    name: Web Auth E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Typecheck web
        run: npm exec tsc -- --noEmit --pretty false
        working-directory: web

      - name: Reset local Supabase
        run: npm run supabase:reset

      - name: Run local Supabase E2E
        run: npm run test:e2e:local-supabase

      - name: Stop local Supabase
        if: always()
        run: npm run supabase:stop
